services:
  api:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build: .
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    command: streamlit run frontend.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

  batch:
    build: .
    environment:
      - IRIS_DB_PATH=/data/iris.db
    volumes:
      - ./data:/data
    command: python batch_predict.py schedule --interval 300
    restart: unless-stopped
